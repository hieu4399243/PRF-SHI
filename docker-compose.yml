services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shi}
      POSTGRES_USER: ${POSTGRES_USER:-shi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shi}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-shi}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ADMIN_KEY: ${ADMIN_KEY:?set ADMIN_KEY in .env}
    volumes:
      - app_data:/app/app/data
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.reminder_worker", "--watch"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shi}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-shi}
    volumes:
      - app_data:/app/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  app_data:
