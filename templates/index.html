<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trợ lý Nha khoa SHI</title>
<style>
  :root{
    --bg:#edf0f2; --paper:#ffffff; --ink:#1a1a1a; --body:#2e2e2e; --muted:#8a8a8a;
    --teal:#0e9b8e; --teal-deep:#0b7d72; --teal-tint:#e7f4f1; --line:#e4e4e4;
    --user:#0e9b8e; --warn:#b25a2b;
  }
  *{box-sizing:border-box}
  :root{ --col:860px; }  /* bề rộng cột hội thoại trên màn hình lớn */
  body{
    margin:0; background:var(--bg); color:var(--body); height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    display:flex; flex-direction:column;
  }
  /* Toàn màn hình: khung chat trải kín viewport, không bo góc/đổ bóng. */
  .app{
    width:100%; height:100vh; height:100dvh; background:var(--paper);
    display:flex; flex-direction:column; overflow:hidden;
  }
  /* Bọc giữ nội dung căn giữa theo cột dễ đọc trên màn hình rộng. */
  .wrap{width:100%; max-width:var(--col); margin:0 auto}
  /* Header */
  .head{
    background:linear-gradient(135deg,var(--teal),var(--teal-deep)); color:#fff;
  }
  .head .wrap{
    padding:16px 20px; display:flex; align-items:center; gap:12px;
  }
  .avatar{
    width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .head h1{font-size:16px; margin:0; font-weight:700}
  .head p{font-size:11.5px; margin:2px 0 0; opacity:.9}
  .status{margin-left:auto; font-size:11px; display:flex; align-items:center; gap:6px}
  .dot{width:8px; height:8px; border-radius:50%; background:#7CFFB2; box-shadow:0 0 0 3px rgba(124,255,178,.25)}

  /* Messages */
  .msgs{
    flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:12px; background:#f6f8f8;
    padding:18px 16px;
    /* Căn giữa cột hội thoại: chừa lề hai bên khi màn hình rộng hơn --col. */
    padding-inline:max(16px, calc((100% - var(--col)) / 2));
  }
  .row{display:flex; gap:8px; max-width:88%}
  .row.bot{align-self:flex-start}
  .row.user{align-self:flex-end; flex-direction:row-reverse}
  .bubble{
    padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.55;
    box-shadow:0 1px 2px rgba(0,0,0,.05); word-wrap:break-word;
  }
  .bot .bubble{background:#fff; color:var(--body); border-bottom-left-radius:4px}
  .user .bubble{background:var(--user); color:#fff; border-bottom-right-radius:4px}
  .mini-avatar{
    width:30px; height:30px; border-radius:50%; flex-shrink:0; font-size:16px;
    display:flex; align-items:center; justify-content:center;
    background:var(--teal-tint); color:var(--teal-deep);
  }
  .user .mini-avatar{background:#dfe7e6}
  .disclaimer{display:block; margin-top:8px; font-size:11.5px; color:var(--muted); line-height:1.45}
  .muted{color:var(--muted)}
  .cal-link{
    display:inline-block; margin-top:6px; padding:8px 13px; border-radius:10px;
    background:var(--teal-tint); color:var(--teal-deep); text-decoration:none;
    font-size:12.5px; font-weight:700; border:1px solid var(--teal);
  }
  .cal-link:hover{background:var(--teal); color:#fff}

  /* Option buttons */
  .options{display:flex; flex-wrap:wrap; gap:8px; align-self:flex-start; max-width:88%; margin-top:-4px}
  .opt{
    border:1.5px solid var(--teal); color:var(--teal-deep); background:#fff;
    padding:8px 13px; border-radius:20px; font-size:13px; font-weight:600;
    cursor:pointer; transition:.15s;
  }
  .opt:hover{background:var(--teal); color:#fff}

  /* Typing indicator */
  .typing .bubble{display:flex; gap:4px; padding:14px}
  .typing span{width:7px; height:7px; border-radius:50%; background:#b9c6c4; animation:bounce 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

  /* Input */
  .input{border-top:1px solid var(--line); background:#fff}
  .input .wrap{display:flex; gap:8px; padding:12px 16px}
  .input input{
    flex:1; border:1.5px solid var(--line); border-radius:22px; padding:11px 16px;
    font-size:14px; outline:none; font-family:inherit;
  }
  .input input:focus{border-color:var(--teal)}
  .send{
    border:0; background:var(--teal); color:#fff; width:44px; height:44px;
    border-radius:50%; font-size:18px; cursor:pointer; flex-shrink:0;
  }
  .send:hover{background:var(--teal-deep)}
  .send:disabled{opacity:.5; cursor:default}
</style>
</head>
<body>
  <div class="app">
    <div class="head">
      <div class="wrap">
        <div class="avatar">🦷</div>
        <div>
          <h1>Trợ lý Nha khoa SHI</h1>
          <p>Chọn dịch vụ nha khoa &amp; Đặt lịch hẹn</p>
        </div>
        <div class="status"><span class="dot"></span> Online</div>
      </div>
    </div>

    <div class="msgs" id="msgs"></div>

    <form class="input" id="form" autocomplete="off">
      <div class="wrap">
        <input id="text" placeholder="Mô tả vấn đề răng miệng của bạn..." />
        <button class="send" id="send" type="submit">➤</button>
      </div>
    </form>
  </div>

<script>
const msgs = document.getElementById('msgs');
const form = document.getElementById('form');
const text = document.getElementById('text');
const sendBtn = document.getElementById('send');

function scrollDown(){ msgs.scrollTop = msgs.scrollHeight; }

function addMessage(html, who){
  const row = document.createElement('div');
  row.className = 'row ' + who;
  row.innerHTML = `<div class="mini-avatar">${who==='bot'?'🤖':'🙂'}</div>
                   <div class="bubble">${html}</div>`;
  msgs.appendChild(row);
  scrollDown();
}

function addOptions(options){
  if(!options || !options.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'options';
  options.forEach(o => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = o.label;
    b.onclick = () => {
      wrap.remove();
      addMessage(o.label, 'user');
      send(o.value);
    };
    wrap.appendChild(b);
  });
  msgs.appendChild(wrap);
  scrollDown();
}

let typingEl = null;
function showTyping(){
  typingEl = document.createElement('div');
  typingEl.className = 'row bot typing';
  typingEl.innerHTML = `<div class="mini-avatar">🤖</div>
    <div class="bubble"><span></span><span></span><span></span></div>`;
  msgs.appendChild(typingEl);
  scrollDown();
}
function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl = null; } }

async function send(message){
  sendBtn.disabled = true;
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message })
    });
    const data = await res.json();
    await new Promise(r => setTimeout(r, 450)); // cảm giác "đang gõ"
    hideTyping();
    addMessage(data.reply, 'bot');
    addOptions(data.options);
  } catch(e){
    hideTyping();
    addMessage('Xin lỗi, có lỗi kết nối. Vui lòng thử lại.', 'bot');
  }
  sendBtn.disabled = false;
  text.focus();
}

form.onsubmit = (e) => {
  e.preventDefault();
  const m = text.value.trim();
  if(!m) return;
  addMessage(m, 'user');
  text.value = '';
  send(m);
};

// Lời chào ban đầu
async function start(){
  showTyping();
  const res = await fetch('/api/start', {method:'POST'});
  const data = await res.json();
  await new Promise(r => setTimeout(r, 400));
  hideTyping();
  addMessage(data.reply, 'bot');
  addOptions(data.options);
}
start();
</script>
</body>
</html>
